name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

  release:
    needs: quality-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches module.json
        run: |
          MODULE_VERSION=$(jq -r '.version' module.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MODULE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi

      - name: Read module metadata
        id: meta
        run: |
          echo "id=$(jq -r '.id' module.json)" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title' module.json)" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MODULE_ID="${{ steps.meta.outputs.id }}"
          OUTPUT_FILE="${MODULE_ID}-v${VERSION}.zip"
          GITHUB_PATH="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${GITHUB_PATH}/releases/download/v${VERSION}/${OUTPUT_FILE}"

          # Create staging directory
          STAGING=$(mktemp -d)

          # Copy module files
          cp module.json "$STAGING/"
          for dir in scripts lang styles templates assets packs icons images fonts; do
            [ -d "$dir" ] && cp -r "$dir" "$STAGING/"
          done
          for file in README.md LICENSE CHANGELOG.md; do
            [ -f "$file" ] && cp "$file" "$STAGING/"
          done

          # Update download URL in staged module.json
          jq --arg url "$DOWNLOAD_URL" '.download = $url' "$STAGING/module.json" > "$STAGING/module.json.tmp"
          mv "$STAGING/module.json.tmp" "$STAGING/module.json"

          # Create ZIP
          mkdir -p releases
          (cd "$STAGING" && zip -r -q "$GITHUB_WORKSPACE/releases/${OUTPUT_FILE}" .)

          echo "zip_path=releases/${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'v${{ steps.version.outputs.version }}'
          generate_release_notes: true
          files: |
            releases/${{ steps.meta.outputs.id }}-v${{ steps.version.outputs.version }}.zip
            module.json
